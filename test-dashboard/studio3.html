async function callService(serviceId, operation, payload, provider=null) {
  const url = `${GATEWAY_BASE}/${serviceId}/${operation}`;
  const headers = { 'Content-Type':'application/json', 'X-Forge-Demo':'true' };
  if(provider) headers['X-Provider'] = provider;
  const t0 = performance.now();
  try {
    const res = await fetch(url, { method:'POST', headers, body:JSON.stringify(payload) });
    const latency = Math.round(performance.now()-t0);
    const data = await res.json().catch(()=>({}));
    addToLog('POST', url, res.status, latency);
    return { status: res.status, ok: res.ok, data, latency };
  } catch(err) {
    const latency = Math.round(performance.now()-t0);
    addToLog('POST', url, 0, latency);
    return { status: 0, ok: false, data:{}, latency, networkError: true };
  }
}

async function runOperation(serviceId, operation) {
if(isRunning) return;
const def = FORMS[serviceId]?.[operation];
if(!def) return;
const svc = SERVICES.find(s=>s.id===serviceId);

// Collect form data
const payload = {};
let valid = true;
def.fields.forEach(f => {
if(f.type===‘checkboxes’) {
const checked = […document.querySelectorAll(`input[name="${f.name}[]"]:checked`)].map(c=>c.value);
payload[f.name] = checked;
} else {
const el = document.getElementById(`field-${f.name}`);
if(el) {
const val = el.value.trim();
if(f.required && !val) {
el.classList.add(‘field-invalid’);
setTimeout(()=>el.classList.remove(‘field-invalid’),600);
valid = false;
} else {
el.classList.remove(‘field-invalid’);
payload[f.name] = val;
}
}
}
});
if(!valid) return;

isRunning = true;
const runBtn = document.getElementById(‘run-btn’);
if(runBtn) { runBtn.disabled = true; runBtn.innerHTML = ‘<span>Running…</span>’; }

// Show steps
const rpi = document.getElementById(‘right-panel-inner’);
if(rpi) {
rpi.innerHTML = ` <div class="steps-container"> <div class="steps-title">Processing</div> ${def.steps.map((s,i)=>`
<div class="step-row" id="step-${i}">
<div class="step-icon pending" id="step-icon-${i}"></div>
<span class="step-name" id="step-name-${i}">${s}</span>
<span class="step-status" id="step-status-${i}"></span>
</div>
`).join('')} </div> <div id="result-container"></div> `;
}

// Animate steps
const t0 = performance.now();
await animateSteps(def.steps.length);

// Call or mock
let result;
const isScaffolded = svc?.tier===‘scaffolded’;
if(isScaffolded) {
await delay(400);
result = { status:200, ok:true, data: def.mock(), latency: Math.round(performance.now()-t0) };
} else {
result = await callService(serviceId, operation, payload, currentProvider);
// If network error, use mock for better demo experience but show grey state
if(result.networkError || result.status===0) {
result.data = def.mock();
result.mocked = true;
}
}

// Mark last step
markStepDone(def.steps.length-1, result.ok || isScaffolded || result.mocked);
await delay(200);

renderResultCard(result, def, isScaffolded);

isRunning = false;
if(runBtn) { runBtn.disabled = false; runBtn.innerHTML = ‘<span>Run</span><span>→</span>’; }
}

async function animateSteps(count) {
for(let i=0; i<count-1; i++) {
const row = document.getElementById(`step-${i}`);
const icon = document.getElementById(`step-icon-${i}`);

if(row) { row.classList.add(‘visible’); }
if(icon) { icon.className=‘step-icon active’; }
if(name) { name.className=‘step-name active’; }
await delay(220+Math.random()*180);
if(icon) { icon.className=‘step-icon done’; icon.textContent=‘✓’; }
if(name) { name.className=‘step-name done’; }
}
// Show last step
const lastRow = document.getElementById(`step-${count-1}`);
const lastIcon = document.getElementById(`step-icon-${count-1}`);
const lastName = document.getElementById(`step-name-${count-1}`);
if(lastRow) lastRow.classList.add(‘visible’);
if(lastIcon) { lastIcon.className=‘step-icon active’; }
if(lastName) { lastName.className=‘step-name active’; }
await delay(300);
}

// ───────────────────────────────────────────
function renderResultCard(result, def, isMocked=false) {
const container = document.getElementById(‘result-container’);
if(!container) return;

let statusClass, statusIcon, statusText, httpClass;
if(isMocked || result.ok) {
statusClass=‘success’; statusIcon=‘✓’; statusText=‘Success’;
httpClass = isMocked?‘net’:‘ok’;
} else if(result.networkError||result.status===0) {
statusClass=‘muted’; statusIcon=‘⚡’; statusText=‘Gateway Offline’;
httpClass=‘net’;
} else if(result.status>=500) {
statusClass=‘error’; statusIcon=‘✗’; statusText=‘Server Error’;
httpClass=‘err5’;
} else {
statusClass=‘warn’; statusIcon=‘⚠’; statusText=‘Client Error’;
httpClass=‘err4’;
}

const statusPill = result.status ? `HTTP ${result.status}` : ‘Network’;
const note = result.networkError && !isMocked ? `<div style="padding:12px 20px;font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;border-top:1px solid var(--border)">⚡ Could not reach gateway — endpoint may not be configured yet. Showing mock response.</div>` : ‘’;

// Extract key-value pairs from data
const flat = flattenObj(result.data, 4);
const kvHTML = flat.map(([k,v])=>`<div class="kv-row"> <span class="kv-key">${k}</span> <span class="kv-val" style="position:relative"> ${v} ${(String(v).length > 8) ?`<button class="copy-btn" onclick="copyText('${escHTML(String(v))}',this)" title="Copy">⎘</button>`: ''} </span> </div>`).join(’’);

const jsonStr = JSON.stringify(result.data, null, 2);
const jsonHighlighted = highlightJSON(jsonStr);
const jsonId = ‘json-’+Math.random().toString(36).substr(2,6);

container.innerHTML = `<div class="result-card"> <div class="result-header"> <div class="result-status-text"> <span class="result-icon">${statusIcon}</span> <span class="result-label ${statusClass}">${statusText}</span> </div> <div class="result-meta"> <span class="http-pill ${httpClass}">${statusPill}</span> <span class="timing-pill">${result.latency||0}ms</span> </div> </div> ${note} <div class="result-kv">${kvHTML}</div> <div class="json-toggle-row"> <button class="json-toggle-btn" onclick="toggleJSON('${jsonId}',this)">▼ View JSON Response</button> </div> <div class="json-block-wrap" id="${jsonId}"> <div class="json-block"> <button class="json-copy-btn" onclick="copyJSON('${jsonId}',this)">⎘ Copy</button> <pre>${jsonHighlighted}</pre> </div> </div> </div>`;
}

function flattenObj(obj, maxDepth=3, prefix=’’, depth=0) {
const result = [];
if(!obj || typeof obj!==‘object’) return [[prefix||‘value’, obj]];
for(const [k,v] of Object.entries(obj)) {
const key = prefix ? `${prefix}.${k}` : k;
if(depth<maxDepth && v && typeof v===‘object’ && !Array.isArray(v)) {
result.push(…flattenObj(v, maxDepth, key, depth+1));
} else if(Array.isArray(v)) {
result.push([key, `[${v.length} items]`]);
} else {
result.push([key, v]);
}
if(result.length>=10) break;
}
return result;
}

function highlightJSON(str) {
return escHTML(str)
.replace(/”([^”]+)”:/g, ‘<span class="j-key">”$1”</span>:’)
.replace(/: “([^”]*)”/g, ‘: <span class="j-str">”$1”</span>’)
.replace(/: (\d+.?\d*)/g, ‘: <span class="j-num">$1</span>’)
.replace(/: (true|false)/g, ‘: <span class="j-bool">$1</span>’)
.replace(/: null/g, ‘: <span class="j-null">null</span>’);
}

function escHTML(str) {
return String(str).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);
}

function toggleJSON(id, btn) {
const wrap = document.getElementById(id);
if(!wrap) return;
const open = wrap.classList.toggle(‘open’);
btn.textContent = open ? ‘▲ Hide JSON’ : ‘▼ View JSON Response’;
}

function copyJSON(id, btn) {
const wrap = document.getElementById(id);
const pre = wrap?.querySelector(‘pre’);
if(pre) {
navigator.clipboard.writeText(pre.textContent||’’);
btn.textContent=‘✓ Copied’; setTimeout(()=>btn.textContent=‘⎘ Copy’,2000);
}
}

function copyText(text, btn) {
navigator.clipboard.writeText(text);
const old = btn.textContent; btn.textContent=‘✓’; setTimeout(()=>btn.textContent=old,2000);
}

if(!def) return ‘’;
const fields = def.fields.slice(0,3); // show first 3 fields
const connector = idx<total-1 ? `<div class="flow-connector"> <svg><line class="flow-connector-line" id="conn-${idx}" x1="1" y1="0" x2="1" y2="32"/></svg> </div>` : ‘’;

return ` <div class="flow-step-card" id="flow-card-${idx}" style="opacity:0.4;pointer-events:none"> <div class="flow-step-header"> <div class="flow-step-num" id="flow-num-${idx}">${idx+1}</div> <div class="flow-step-name">${def.label||op}</div> <span class="flow-check" id="flow-check-${idx}" style="display:none">✅</span> </div> <div id="flow-fields-${idx}"> ${fields.map(f=>`
<div class="field-row">
<div class="field-label">${f.label}</div>
<div class="field-ref-wrap">
<input class="field-input" type="${f.type==='textarea'?'text':f.type||'text'}" id="flow-field-${idx}-${f.name}" placeholder="${f.placeholder||''}" />
<span class="flow-prefill-tag" id="flow-tag-${idx}-${f.name}" style="display:none">pre-filled</span>
</div>
</div>
`).join('')} </div> <button class="continue-btn" id="flow-btn-${idx}" disabled onclick="runFlowStep(${idx},'${serviceId}','${op}')"> ${idx===0?'Start →':'Continue →'} </button> </div> ${connector} `;
}

function activateFlowStep(idx, serviceId, steps) {
const card = document.getElementById(`flow-card-${idx}`);
if(!card) return;
card.style.opacity=‘1’;
card.style.pointerEvents=‘auto’;
card.classList.add(‘active-step’);
const btn = document.getElementById(`flow-btn-${idx}`);
if(btn) btn.disabled = false;
}

let flowResults = {};
async function runFlowStep(idx, serviceId, op) {
const def = FORMS[serviceId]?.[op];
if(!def) return;
const steps = FLOWS[serviceId];

const btn = document.getElementById(`flow-btn-${idx}`);
if(btn) { btn.disabled=true; btn.textContent=‘Running…’; }

const payload = {};
def.fields.slice(0,3).forEach(f=>{
const el = document.getElementById(`flow-field-${idx}-${f.name}`);
if(el) payload[f.name]=el.value;
});

await delay(1200+Math.random()*800);
const mockData = def.mock();
flowResults[op] = mockData;

// Mark card done
const card = document.getElementById(`flow-card-${idx}`);
if(card) { card.classList.remove(‘active-step’); card.classList.add(‘done’); }
const num = document.getElementById(`flow-num-${idx}`);
if(num) num.classList.add(‘done’);
const check = document.getElementById(`flow-check-${idx}`);
if(check) check.style.display=‘inline’;

// Animate connector
const conn = document.getElementById(`conn-${idx}`);
if(conn) conn.classList.add(‘animated’);

// Pre-fill next step
const nextIdx = idx+1;
if(nextIdx<steps.length) {
await delay(400);
const nextOp = steps[nextIdx];
const nextDef = FORMS[serviceId]?.[nextOp];
if(nextDef) {
nextDef.fields.slice(0,3).forEach(f=>{
const nextEl = document.getElementById(`flow-field-${nextIdx}-${f.name}`);
// Try to fill from mock data
const val = mockData[f.name] || mockData.transaction_id || mockData.reference || mockData.account_id || mockData.access_token || ‘’;
if(nextEl && val) {
nextEl.value = val;
const tag = document.getElementById(`flow-tag-${nextIdx}-${f.name}`);
if(tag && val) tag.style.display=‘inline’;
}
});
}
activateFlowStep(nextIdx, serviceId, steps);
} else {
// Flow complete
await delay(400);
const fc = document.getElementById(‘flow-complete’);
if(fc) {
fc.style.display=‘block’;
const t = Object.keys(flowResults).length;
fc.innerHTML = `<div class="flow-complete-card"> <div class="flow-complete-icon">🎉</div> <div class="flow-complete-title">Flow Complete!</div> <div class="flow-complete-sub">${t} steps executed successfully · All outputs captured</div> <button class="continue-btn" style="margin-top:16px" onclick="navigateTo('${serviceId}')">Back to Service</button> </div>`;
}
}
}

// ───────────────────────────────────────────
// 11. GLARE CARDS
// ───────────────────────────────────────────
function initGlareCards() {
document.querySelectorAll(’.glare-card’).forEach(card => {
card.addEventListener(‘mousemove’, e => {
const rect = card.getBoundingClientRect();
const cx = rect.left + rect.width/2;
const cy = rect.top + rect.height/2;
const dx = (e.clientX - cx) / (rect.width/2);
const dy = (e.clientY - cy) / (rect.height/2);
const rotX = -dy*7;
const rotY = dx*7;
card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
const overlay = card.querySelector(’.glare-overlay’);
if(overlay) {
const px = ((e.clientX-rect.left)/rect.width)*100;
const py = ((e.clientY-rect.top)/rect.height)*100;
overlay.style.background = `radial-gradient(circle at ${px}% ${py}%, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0) 60%)`;
}
});
card.addEventListener(‘mouseleave’, () => {
card.style.transition = ‘transform 400ms ease’;
card.style.transform = ‘perspective(800px) rotateX(0deg) rotateY(0deg)’;
const overlay = card.querySelector(’.glare-overlay’);
if(overlay) overlay.style.background = ‘none’;
setTimeout(()=>card.style.transition=’’,400);
});
});
}

function resetBranding() {
localStorage.removeItem(‘forge-branding’);
document.documentElement.style.setProperty(’–accent’,’#4f6ef7’);
document.getElementById(‘nav-logo-text’).textContent=‘Forge’;
document.getElementById(‘nav-logo-box’).innerHTML=‘F’;
document.getElementById(‘demo-banner’).classList.remove(‘visible’);
document.getElementById(‘b-client-name’).value=’’;
document.getElementById(‘b-logo-url’).value=’’;
document.getElementById(‘b-accent’).value=’#4f6ef7’;
document.getElementById(‘b-note’).value=’’;
}
function loadBranding() {
const saved = JSON.parse(localStorage.getItem(‘forge-branding’)||’{}’);
if(saved.accent) document.documentElement.style.setProperty(’–accent’, saved.accent);
if(saved.clientName) { clientName=saved.clientName; document.getElementById(‘nav-logo-text’).textContent=saved.clientName+’ · Forge’; }
if(saved.logoUrl) {
const lb = document.getElementById(‘nav-logo-box’);
if(lb) lb.innerHTML=`<img src="${saved.logoUrl}" onerror="this.parentNode.innerHTML='F'" />`;
}
if(saved.note) {
const b = document.getElementById(‘demo-banner’);
if(b) { b.textContent=saved.note; b.classList.add(‘visible’); }
}
}

// ───────────────────────────────────────────
function addToLog(method, url, status, ms) {
requestLog.unshift({method,url,status,ms,ts:new Date()});
if(requestLog.length>20) requestLog.pop();
updateLogUI();
}
function updateLogUI() {
const pill = document.getElementById(‘log-count’);
if(pill) pill.textContent=`${requestLog.length} call${requestLog.length!==1?'s':''}`;
const entries = document.getElementById(‘log-entries’);
if(!entries) return;
entries.innerHTML = requestLog.slice(0,5).map(e=>{
let sc=’’, txt=’’;
if(e.status===0) { sc=‘log-status-warn’; txt=‘ERR’; }
else if(e.status<300) { sc=‘log-status-ok’; txt=e.status; }
else if(e.status<500) { sc=‘log-status-warn’; txt=e.status; }
else { sc=‘log-status-err’; txt=e.status; }
const short = e.url.replace(GATEWAY_BASE,’’);
return `<div class="log-entry"><span class="log-method">${e.method}</span><span class="log-url">${short}</span><span class="${sc}">${txt}</span><span class="log-ms">${e.ms}ms</span></div>`;
}).join(’’);
}
function toggleLog() {
logOpen = !logOpen;
document.getElementById(‘log-panel’).classList.toggle(‘open’, logOpen);
updateLogUI();
}
function clearLog() { requestLog.length=0; updateLogUI(); }
