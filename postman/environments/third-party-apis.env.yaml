name: Third-Party APIs
values:
  # ─── MESSAGING: Slack ───────────────────────────────────────────────────────
  - key: slack_token
    value: ''
    type: secret
    enabled: true
  - key: slack_base_url
    value: 'https://slack.com/api'
    type: default
    enabled: true

