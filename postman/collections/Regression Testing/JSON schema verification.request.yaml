$kind: http-request
description: |-
  This request has a test using Postman's built-in support for JSON Schema verification to ensure that the response data matches the expected shape.

  Schema validation can be used to verify your API returns data in the right format, without worrying about the exact values. This might be helpful when testing various inputs for a consistent output format.

  Learn more about JSON Schema at [https://json-schema.org](https://json-schema.org/.).
url: "{{baseUrl}}/post"
method: POST
body:
  type: json
  content: |-
    [{
        "title": "Sapiens",
        "author": "Yuval Noah Harari",
        "published": 2011
    }, {
        "title": "Moneyball",
        "author": "Michael Lewis",
        "published": 2010
    }, {
        "title": "Women & Power",
        "author": "Mary Beard",
        "published": 2017
    }]
scripts:
  - type: afterResponse
    code: |-
      // Describe the expected response shape with JSON Schema
      // https://json-schema.org/
      const expectedSchema = {
        "type": "object",
        "properties": {
          "data": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "title": {
                  "type": "string"
                },
                "author": {
                  "type": "string"
                },
                "published": {
                  "type": "integer"
                }
              },
              "required": [
                "title",
                "author",
                "published"
              ]
            }
          }
        }
      };

      // Test that the response matches the expected schema using built-in schema verification
      pm.test('response matches JSON schema', () => {
          pm.response.to.have.jsonSchema(expectedSchema);
      });
    language: text/javascript
order: 2000
