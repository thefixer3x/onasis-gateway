$kind: http-example
request:
  url: "{{baseUrl}}/v2/oauth/access_token"
  method: POST
  body:
    type: urlencoded
    content:
      - key: client_id
        value: 141024g14g28104gff1h
        description: (Required) Client ID (Consumer Key) of your application
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "access_token": "",
       "token_type": "Bearer"
      }
order: 1000
