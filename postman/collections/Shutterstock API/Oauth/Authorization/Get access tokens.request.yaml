$kind: http-request
description: This endpoint returns an access token for the specified user and with the specified scopes. The token does not expire until the user changes their password. The body parameters must be encoded as form data.
url: "{{baseUrl}}/v2/oauth/access_token"
method: POST
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
body:
  type: urlencoded
  content:
    - key: client_id
      value: <string>
      description: (Required) Client ID (Consumer Key) of your application
    - key: grant_type
      value: <string>
      description: "(Required) Grant type: authorization_code generates user tokens, client_credentials generates short-lived client grants"
    - key: client_secret
      value: <string>
      disabled: true
      description: Client Secret (Consumer Secret) of your application
    - key: code
      value: <string>
      disabled: true
      description: Response code from the /oauth/authorize flow; required if grant_type=authorization_code
    - key: realm
      value: customer
      disabled: true
      description: User type to be authorized (usually 'customer')
    - key: expires
      value: "false"
      disabled: true
      description: Whether or not the token expires, expiring tokens come with a refresh_token to renew the access_token
    - key: refresh_token
      value: <string>
      disabled: true
      description: Pass this along with grant_type=refresh_token to get a fresh access token
examples: ./.resources/Get access tokens.resources/examples
order: 2000
