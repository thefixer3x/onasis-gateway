$kind: http-example
request:
  url: "{{baseUrl}}/v2/sfx/licenses/:id/downloads"
  method: POST
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    id: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "url": "http://download.dev.shutterstock.com/gatekeeper/abc/shutterstock_id.wav"
      }
order: 1000
