$kind: http-example
request:
  url: "{{baseUrl}}/v2/sfx/licenses"
  method: POST
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  body:
    type: text
    content: |-
      {
          "sound_effects": [
              {
                  "format": "wav",
                  "sfx_id": "123456789",
                  "metadata": {
                      "customer_id": "12345",
                      "geo_location": "US",
                      "number_viewed": "15",
                      "search_term": "dog"
                  },
                  "show_modal": true,
                  "size": "ambisonic",
                  "subscription_id": "s12345678"
              }
          ]
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 2000
