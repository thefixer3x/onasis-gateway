$kind: http-example
request:
  url: "{{baseUrl}}/v2/sfx/licenses"
  method: POST
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  body:
    type: text
    content: |-
      {
          "sound_effects": [
              {
                  "format": "wav",
                  "sfx_id": "123456789",
                  "metadata": {
                      "customer_id": "12345",
                      "geo_location": "US",
                      "number_viewed": "15",
                      "search_term": "dog"
                  },
                  "show_modal": true,
                  "size": "ambisonic",
                  "subscription_id": "s12345678"
              }
          ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        {
         "allotment_charge": 1,
         "download": {
          "url": "https://download.shutterstock.com/gatekeeper/[random-characters]/shutterstock_59656357.mp3"
         },
         "sfx_id": "123456789"
        }
       ],
       "page": 1,
       "per_page": 5,
       "total_count": 123455
      }
order: 1000
