    page: "1"
    per_page: "20"
    sort: newest
    username: aUniqueUsername
    start_date: 2021-03-29T13:25:13.521Z
    end_date: 2021-03-29T13:25:13.521Z
    license_id: <string>
    download_availability: all
    team_history: "false"
