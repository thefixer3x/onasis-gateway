$kind: http-example
request:
  url: "{{baseUrl}}/v2/videos/:id/similar?language=es&page=1&per_page=20&view=minimal"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    language: es
    page: "1"
    per_page: "20"
    view: minimal
  pathVariables:
    id: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 2000
