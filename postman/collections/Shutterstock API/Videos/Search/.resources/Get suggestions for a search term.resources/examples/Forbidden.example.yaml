$kind: http-example
request:
  url: "{{baseUrl}}/v2/videos/search/suggestions?query=cats&limit=10"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    query: cats
    limit: "10"
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 4000
