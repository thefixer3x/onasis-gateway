$kind: http-example
request:
  url: "{{baseUrl}}/v2/videos/search/suggestions?query=cats&limit=10"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    query: cats
    limit: "10"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        "cat scan",
        "cats and dogs",
        "cats playing",
        "catsuit",
        "cat silhouette",
        "catskills",
        "cats eyes",
        "cat sitting",
        "cat sleeping",
        "cats eye"
       ]
      }
order: 1000
