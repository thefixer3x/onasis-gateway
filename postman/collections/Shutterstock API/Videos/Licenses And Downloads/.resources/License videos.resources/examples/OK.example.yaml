$kind: http-example
request:
  url: "{{baseUrl}}/v2/videos/licenses?subscription_id=s12345678&size=web&search_id=<string>"
  method: POST
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  queryParams:
    subscription_id: s12345678
    size: web
    search_id: <string>
  body:
    type: text
    content: |-
      {
          "videos": [
              {
                  "size": "hd",
                  "subscription_id": "s12345678",
                  "video_id": "2140697"
              }
          ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        {
         "allotment_charge": 1,
         "download": {
          "url": "https://download.shutterstock.com/gatekeeper/[random-characters]/shutterstock_59656357.mp4"
         },
         "price": {
          "local_amount": 12.34,
          "local_currency": "EUR"
         },
         "video_id": "123456789"
        }
       ],
       "page": 1,
       "per_page": 5,
       "total_count": 123455
      }
order: 1000
