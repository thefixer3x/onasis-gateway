$kind: http-request
description: This endpoint adds one or more videos to a collection by video IDs.
url: "{{baseUrl}}/v2/videos/collections/:id/items"
method: POST
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
pathVariables:
  - key: id
    value: <string>
    description: (Required) The ID of the collection to which items should be added
body:
  type: text
  content: |-
    {
        "items": [
            {
                "id": "<string>",
                "added_time": "<dateTime>",
                "media_type": "<string>"
            },
            {
                "id": "<string>",
                "added_time": "<dateTime>",
                "media_type": "<string>"
            }
        ]
    }
auth:
  type: oauth2
examples: ./.resources/Add videos to collections.resources/examples
order: 6000
