$kind: http-example
request:
  url: "{{baseUrl}}/v2/videos/collections"
  method: POST
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  body:
    type: text
    content: |-
      {
          "name": "Test Collection 19cf"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "id": "48433105"
      }
order: 1000
