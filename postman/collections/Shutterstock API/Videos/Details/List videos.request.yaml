$kind: http-request
description: This endpoint lists information about one or more videos, including the aspect ratio and URLs to previews.
url: "{{baseUrl}}/v2/videos?id=<asset-id>"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: id
    value: <asset-id>
    description: (Required) One or more video IDs
  - key: view
    value: minimal
    disabled: true
    description: Amount of detail to render in the response
  - key: search_id
    value: <string>
    disabled: true
    description: The ID of the search that is related to this request
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/List videos.resources/examples
order: 1000
