  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        {
         "id": "1",
         "name": "Animals/Wildlife"
        },
        {
         "id": "11",
         "name": "The Arts"
        }
       ],
       "page": 1,
       "per_page": 2,
       "total_count": 13
      }
order: 1000
