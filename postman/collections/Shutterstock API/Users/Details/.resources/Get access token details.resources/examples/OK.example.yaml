$kind: http-example
request:
  url: "{{baseUrl}}/v2/user/access_token"
  method: GET
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "client_id": "c456b-26230-fa8ed-d19ab-05ce2-bf0aa",
       "customer_id": "123456789",
       "realm": "customer",
       "user_id": "123456789",
       "username": "jdoe",
       "expires_in": 3600,
       "scopes": [
        "collections.edit",
        "collections.view",
        "licenses.create",
        "licenses.view",
        "purchases.view",
        "user.view"
       ]
      }
order: 1000
