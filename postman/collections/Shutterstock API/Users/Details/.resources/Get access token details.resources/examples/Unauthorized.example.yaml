$kind: http-example
request:
  url: "{{baseUrl}}/v2/user/access_token"
  method: GET
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 3000
