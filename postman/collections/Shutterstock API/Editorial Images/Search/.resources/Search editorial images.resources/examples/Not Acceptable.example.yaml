      value: relevant
    - key: category
      value: Alone,Performing
    - key: country
      value: USA
    - key: supplier_code
      value: <string>
    - key: supplier_code
      value: <string>
    - key: date_start
      value: 2020-05-29
    - key: date_end
      value: 2021-05-29
    - key: per_page
      value: "20"
    - key: cursor
      value: eyJ2IjoxLCJzIjoxfQ==
