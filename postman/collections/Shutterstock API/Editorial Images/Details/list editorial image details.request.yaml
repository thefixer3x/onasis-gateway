$kind: http-request
description: This endpoint lists the details of editorial images.
url: "{{baseUrl}}/v2/editorial/images?id=<string>&country=<country-code-3>"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: id
    value: <string>
    description: (Required) ID of the editorial image to list details for
  - key: country
    value: <country-code-3>
    description: (Required) Show only editorial image content that is available for distribution in a certain country
  - key: search_id
    value: <string>
    disabled: true
    description: The ID of the search that is related to this request
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/list editorial image details.resources/examples
order: 2000
