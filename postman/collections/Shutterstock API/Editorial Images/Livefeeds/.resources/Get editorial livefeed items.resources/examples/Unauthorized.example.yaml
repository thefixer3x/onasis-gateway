$kind: http-example
request:
  url: "{{baseUrl}}/v2/editorial/images/livefeeds/:id/items?country=USA"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    country: USA
  pathVariables:
    id: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 3000
