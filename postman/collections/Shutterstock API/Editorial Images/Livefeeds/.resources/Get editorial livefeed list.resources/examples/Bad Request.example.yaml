$kind: http-example
request:
  url: "{{baseUrl}}/v2/editorial/images/livefeeds?country=USA&page=1&per_page=20"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    country: USA
    page: "1"
    per_page: "20"
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 2000
