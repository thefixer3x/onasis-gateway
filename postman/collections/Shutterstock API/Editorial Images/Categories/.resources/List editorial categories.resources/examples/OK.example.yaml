$kind: http-example
request:
  url: "{{baseUrl}}/v2/editorial/images/categories"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        {
         "name": "Animal"
        },
        {
         "name": "Awards"
        },
        {
         "name": "Art"
        },
        {
         "name": "Film Stills"
        }
       ]
      }
order: 1000
