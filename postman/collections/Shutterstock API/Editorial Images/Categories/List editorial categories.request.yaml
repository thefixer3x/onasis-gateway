$kind: http-request
description: This endpoint lists the categories that editorial images can belong to, which are separate from the categories that other types of assets can belong to.
url: "{{baseUrl}}/v2/editorial/images/categories"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/List editorial categories.resources/examples
order: 1000
