$kind: http-example
request:
  url: "{{baseUrl}}/v2/catalog/collections?page=1&per_page=20&sort=newest&shared=false"
  method: GET
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  queryParams:
    page: "1"
    per_page: "20"
    sort: newest
    shared: "false"
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 2000
