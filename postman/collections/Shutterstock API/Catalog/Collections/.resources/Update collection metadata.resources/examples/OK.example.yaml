$kind: http-example
request:
  url: "{{baseUrl}}/v2/catalog/collections/:collection_id"
  method: PATCH
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    collection_id: ""
  body:
    type: text
    content: |-
      {
          "name": "My Collection",
          "visibility": "public",
          "cover_asset": {
              "id": "123"
          }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "id": "126351028",
       "name": "My collection",
       "cover_asset": {
        "id": "123",
        "asset": {
         "id": "1690105108",
         "type": "image",
         "name": "Young couple playing tennis at the court"
        },
        "created_time": "2021-06-10T13:26:09-04:00"
       },
       "total_item_count": 2,
       "created_time": "2021-05-20T16:15:22-04:00",
       "updated_time": "2021-06-10T13:26:09-04:00",
       "visibility": "public",
       "role_assignments": {
        "collection_id": "126351028",
        "roles": {
         "owners": [
          {
           "id": "321",
           "type": "USER",
           "email": "userOne@org.com"
          }
         ],
         "editors": [
          {
           "id": "987",
           "type": "USER",
           "email": "userTwo@org.com"
          }
         ],
         "viewers": []
        }
       }
      }
order: 1000
