$kind: http-request
description: This endpoint deletes a catalog collection. It does not remove the assets from the user's account's catalog.
url: "{{baseUrl}}/v2/catalog/collections/:collection_id"
method: DELETE
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
pathVariables:
  - key: collection_id
    value: <string>
    description: (Required) The ID of the collection to delete
auth:
  type: oauth2
examples: ./.resources/Delete catalog collections.resources/examples
order: 4000
