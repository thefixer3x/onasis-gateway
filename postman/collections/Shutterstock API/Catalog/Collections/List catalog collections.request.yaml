$kind: http-request
description: This endpoint returns a list of catalog collections.
url: "{{baseUrl}}/v2/catalog/collections"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: page
    value: "1"
    disabled: true
    description: Page number
  - key: per_page
    value: "20"
    disabled: true
    description: Number of results per page
  - key: sort
    value: newest
    disabled: true
    description: Sort by
  - key: shared
    value: "false"
    disabled: true
    description: Set to true to omit collections that you own and return only collections  that are shared with you
auth:
  type: oauth2
examples: ./.resources/List catalog collections.resources/examples
order: 1000
