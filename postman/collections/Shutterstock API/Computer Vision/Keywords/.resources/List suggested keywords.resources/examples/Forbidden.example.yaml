$kind: http-example
request:
  url: "{{baseUrl}}/v2/cv/keywords?asset_id=<asset-upload-id>"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    asset_id: <asset-upload-id>
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 4000
