$kind: http-example
request:
  url: "{{baseUrl}}/v2/cv/keywords?asset_id=<asset-upload-id>"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    asset_id: <asset-upload-id>
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        "nature",
        "wildlife",
        "animal",
        "cute",
        "bamboo",
        "panda",
        "china",
        "wild",
        "endangered",
        "black",
        "bear"
       ]
      }
order: 1000
