$kind: http-request
description: This endpoint returns videos that are visually similar to an image that you specify or upload.
url: "{{baseUrl}}/v2/cv/similar/videos?asset_id=<string>"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: asset_id
    value: <string>
    description: (Required) The asset ID or upload ID to find similar videos for
  - key: license
    value: commercial
    disabled: true
    description: Show only videos with the specified license
  - key: safe
    value: "true"
    disabled: true
    description: Enable or disable safe search
  - key: language
    value: <string>
    disabled: true
    description: Language for the keywords and categories in the response
  - key: page
    value: "1"
    disabled: true
    description: Page number
  - key: per_page
    value: "20"
    disabled: true
    description: Number of results per page
  - key: view
    value: minimal
    disabled: true
    description: Amount of detail to render in the response
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/List similar videos.resources/examples
order: 2000
