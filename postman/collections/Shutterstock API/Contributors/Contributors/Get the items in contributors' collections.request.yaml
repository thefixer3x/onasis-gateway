$kind: http-request
description: This endpoint lists the IDs of items in a contributor's collection and the date that each was added.
url: "{{baseUrl}}/v2/contributors/:contributor_id/collections/:id/items"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: page
    value: "1"
    disabled: true
    description: Page number
  - key: per_page
    value: "20"
    disabled: true
    description: Number of results per page
  - key: sort
    value: <string>
    disabled: true
    description: Sort order
pathVariables:
  - key: contributor_id
    value: <string>
    description: (Required) Contributor ID
  - key: id
    value: <string>
    description: (Required) Collection ID that belongs to the contributor
auth:
  type: oauth2
examples: ./.resources/Get the items in contributors' collections.resources/examples
order: 5000
