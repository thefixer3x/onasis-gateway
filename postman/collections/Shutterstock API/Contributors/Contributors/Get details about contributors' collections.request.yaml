$kind: http-request
description: This endpoint gets more detailed information about a contributor's collection, including its cover image, timestamps for its creation, and most recent update. To get the items in collections, use GET /v2/contributors/{contributor_id}/collections/{id}/items.
url: "{{baseUrl}}/v2/contributors/:contributor_id/collections/:id"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
pathVariables:
  - key: contributor_id
    value: <string>
    description: (Required) Contributor ID
  - key: id
    value: <string>
    description: (Required) Collection ID that belongs to the contributor
auth:
  type: oauth2
examples: ./.resources/Get details about contributors' collections.resources/examples
order: 4000
