$kind: http-example
request:
  url: "{{baseUrl}}/v2/contributors/:contributor_id/collections/:id"
  method: GET
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    contributor_id: ""
    id: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "id": "293542904",
       "name": "My collection",
       "total_item_count": 85,
       "items_updated_time": "2021-05-20T16:15:22-04:00",
       "cover_item": {
        "id": "297886754"
       }
      }
order: 1000
