$kind: http-request
description: This endpoint lists existing licenses. You can filter the results according to the track ID to see if you have an existing license for a specific track.
url: "{{baseUrl}}/v2/audio/licenses"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: audio_id
    value: <string>
    disabled: true
    description: Show licenses for the specified track ID
  - key: license
    value: <string>
    disabled: true
    description: Restrict results by license.
  - key: page
    value: "1"
    disabled: true
    description: Page number
  - key: per_page
    value: "20"
    disabled: true
    description: Number of results per page
  - key: sort
    value: newest
    disabled: true
    description: Sort order
  - key: username
    value: <string>
    disabled: true
    description: Filter licenses by username of licensee
  - key: start_date
    value: <dateTime>
    disabled: true
    description: Show licenses created on or after the specified date
  - key: end_date
    value: <dateTime>
    disabled: true
    description: Show licenses created before the specified date
  - key: download_availability
    value: all
    disabled: true
    description: Filter licenses by download availability
  - key: team_history
    value: "false"
    disabled: true
    description: Set to true to see license history for all members of your team.
auth:
  type: oauth2
examples: ./.resources/List audio licenses.resources/examples
order: 2000
