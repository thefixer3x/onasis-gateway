$kind: http-request
description: This endpoint returns a list of all audio genres.
url: "{{baseUrl}}/v2/audio/genres"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: language
    value: <string>
    disabled: true
    description: Which language the genres will be returned
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/List audio genres.resources/examples
order: 2000
