$kind: http-example
request:
  url: "{{baseUrl}}/v2/audio/instruments?language=<string>"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    language: <string>
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        "Orchestra",
        "Organ",
        "Oud",
        "Pads",
        "Electric Guitar"
       ]
      }
order: 1000
