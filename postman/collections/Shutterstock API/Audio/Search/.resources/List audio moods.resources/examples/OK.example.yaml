$kind: http-example
request:
  url: "{{baseUrl}}/v2/audio/moods?language=<string>"
  method: GET
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  queryParams:
    language: <string>
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        "Action / Sports",
        "Adventure / Discovery",
        "Aerobics / Workout",
        "Aggressive"
       ]
      }
order: 1000
