$kind: http-example
request:
  url: "{{baseUrl}}/v2/audio/collections/:id"
  method: POST
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    id: ""
  body:
    type: text
    content: |-
      {
          "name": "Best rock music"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: ""
order: 2000
