$kind: http-request
description: This endpoint lists information about one or more audio tracks, including the description and publication date.
url: "{{baseUrl}}/v2/audio?id=<string>"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: id
    value: <string>
    description: (Required) One or more audio IDs
  - key: view
    value: minimal
    disabled: true
    description: Amount of detail to render in the response
  - key: search_id
    value: <string>
    disabled: true
    description: The ID of the search that is related to this request
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/List audio tracks.resources/examples
order: 1000
