$kind: http-request
description: This endpoint gets licenses for one or more editorial videos. You must specify the country and one or more editorial videos to license. The download links in the response are valid for 8 hours.
url: "{{baseUrl}}/v2/editorial/videos/licenses"
method: POST
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
body:
  type: text
  content: |-
    {
        "country": "<country-code-3>",
        "editorial": [
            {
                "editorial_id": "<string>",
                "license": "<string>",
                "metadata": {},
                "size": "original"
            },
            {
                "editorial_id": "<string>",
                "license": "<string>",
                "metadata": {},
                "size": "original"
            }
        ]
    }
auth:
  type: oauth2
examples: ./.resources/License editorial video content.resources/examples
order: 2000
