$kind: http-example
request:
  url: "{{baseUrl}}/v2/images/licenses/:id/downloads"
  method: POST
  headers:
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  pathVariables:
    id: ""
  body:
    type: text
    content: |-
      {
          "size": "small"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "url": "https://download.shutterstock.com/gatekeeper/[random-characters]/shutterstock_59656357.jpg"
      }
order: 1000
