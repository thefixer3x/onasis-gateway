$kind: collection
description: |-
  Image endpoints work with non-editorial photos, illustrations, and vectors, including these tasks:

  - Search
      - Search for images in Shutterstock's library.

  - Details
      - Get additional information for a particular set of images.

  - Licenses and downloads
      - License images for use, view your licensed images, and download licensed images.

  - Collections
      - Group images in a single place, such as storing images for a specific project.

  - Featured Collections
      - Access Shutterstock-created collections of trending content.
order: 1000
