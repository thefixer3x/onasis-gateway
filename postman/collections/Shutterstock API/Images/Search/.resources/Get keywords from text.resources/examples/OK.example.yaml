$kind: http-example
request:
  url: "{{baseUrl}}/v2/images/search/suggestions"
  method: POST
  headers:
    - key: Authorization
      value: Basic <credentials>
      description: "Added as a part of security scheme: basic"
  body:
    type: text
    content: |-
      {
          "text": "Planting flowers is a great way to make springtime more beautiful."
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
       "data": [
        "beach",
        "place",
        "sand",
        "ocean"
       ]
      }
order: 1000
