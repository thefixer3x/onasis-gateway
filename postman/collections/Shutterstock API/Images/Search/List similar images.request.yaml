$kind: http-request
description: This endpoint returns images that are visually similar to an image that you specify.
url: "{{baseUrl}}/v2/images/:id/similar"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: language
    value: <string>
    disabled: true
    description: Language for the keywords and categories in the response
  - key: page
    value: "1"
    disabled: true
    description: Page number
  - key: per_page
    value: "20"
    disabled: true
    description: Number of results per page
  - key: view
    value: minimal
    disabled: true
    description: Amount of detail to render in the response
pathVariables:
  - key: id
    value: <string>
    description: (Required) Image ID
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/List similar images.resources/examples
order: 6000
