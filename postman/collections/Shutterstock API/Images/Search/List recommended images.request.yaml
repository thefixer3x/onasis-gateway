$kind: http-request
description: This endpoint returns images that customers put in the same collection as the specified image IDs.
url: "{{baseUrl}}/v2/images/recommendations?id=<string>"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: id
    value: <string>
    description: (Required) Image IDs
  - key: max_items
    value: "20"
    disabled: true
    description: Maximum number of results returned in the response
  - key: safe
    value: "true"
    disabled: true
    description: Restrict results to safe images
auth:
  type: basic
  credentials:
    username: <Basic Auth Username>
    password: <Basic Auth Password>
examples: ./.resources/List recommended images.resources/examples
order: 7000
