$kind: http-request
description: This endpoint lists your collections of images and their basic attributes.
url: "{{baseUrl}}/v2/images/collections"
method: GET
headers:
  User-Agent: ShutterstockWorkspace/1.2.0
queryParams:
  - key: embed
    value: <string>
    disabled: true
    description: Which sharing information to include in the response, such as a URL to the collection
  - key: page
    value: "1"
    disabled: true
    description: Page number
  - key: per_page
    value: "100"
    disabled: true
    description: Number of results per page
auth:
  type: oauth2
examples: ./.resources/List image collections.resources/examples
order: 2000
