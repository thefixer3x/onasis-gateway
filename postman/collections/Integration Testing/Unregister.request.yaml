$kind: http-request
description: |-
  This request un-registers a token by using the token collection variable in the POST body.

  We also added a test to ensure the response has a 200 OK status code.
url: "{{baseUrl}}/unregister"
method: POST
body:
  type: json
  content: |-
    {
        "token": "{{token}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Returns 200 OK status", () => {
          pm.response.to.have.status(200)
      })
    language: text/javascript
order: 3000
