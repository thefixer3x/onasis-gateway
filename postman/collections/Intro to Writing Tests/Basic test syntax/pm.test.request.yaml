$kind: http-request
description: |-
  This request demonstrates how to work with the `pm.\\\*` API. Send the request to view the results of the sample tests in the "Test Results" tab in the response viewer.

  ### Working with the `pm.\\\*` API

  Use the `pm.\\\*` API to write your test under the **Tests** tab in Postman. The `pm.test()` method accepts two parameters -

  The first parameter is the name of the test, so it's important to give your test a descriptive name to provide more information in case the test fails.

  The second parameter is a function whereby if any assertions within your function fail, then the test will fail.

  ```
  pm.test("Name of the second test", function () {
      // make as many assertions as you'd like as part of this test
      // if any assertion throws an error, this test will fail
      pm.response.to.have.status(200);
      pm.response.to.be.ok;
      pm.response.to.be.json;
  });

  ```
url: https://postman-echo.com/get?foo1=bar1&foo2=bar2
method: GET
queryParams:
  foo1: bar1
  foo2: bar2
scripts:
  - type: afterResponse
    code: |
      // use the `pm.*` API to write your test
      // the `pm.test()` method accepts 2 parameters
      // the first parameter is the name of your test (be descriptive)
      // the second parameter is a function whereby if any assertions within your function fail, then the test will fail

      pm.test("Name of the first test", function () {
          // make an assertion
          // if your assertion throws an error, this test will fail
          pm.response.to.have.status(200);
      });

      pm.test("Name of the second test", function () {
          // make as many assertions as you'd like as part of this test
          // if any assertion throws an error, this test will fail
          pm.response.to.have.status(200);
          pm.response.to.be.ok;
          pm.response.to.be.json;
      });
    language: text/javascript
examples: ./.resources/pm.test.resources/examples
order: 1000
